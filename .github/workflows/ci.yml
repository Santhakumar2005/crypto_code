name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Backend
      - name: Install backend dependencies
        working-directory: vaultx_backend
        run: npm install

      - name: Run backend tests
        working-directory: vaultx_backend
        run: npm test || echo "No tests"

      # Frontend
      - name: Install frontend dependencies
        working-directory: vaultx_frontend
        run: npm install

      - name: Build frontend
        working-directory: vaultx_frontend
        run: npm run build || echo "No build step"