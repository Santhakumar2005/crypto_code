name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Backend setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend dependencies
        run: |
          cd vaultx_backend
          npm install

      - name: Run backend tests
        run: |
          cd vaultx_backend
          npm test || echo "No tests yet"

      # Frontend setup
      - name: Install frontend dependencies
        run: |
          cd vaultx_frontend
          npm install

      - name: Build frontend
        run: |
          cd vaultx_frontend
          npm run build